<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>الفيديوهات</title>
<style>
  body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background-color: #000; /* الخلفية الأصلية سوداء */
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .title {
    font-weight: 900;
    font-size: 16px; /* نفس حجم الكتابة بالكروت */
    color: white;
    text-align: center;
    padding: 12px 0 0 0;
  }
  .video-player {
    flex: 0 0 30%;
    background-color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 10px 0 10px;
    position: relative;
  }
  iframe {
    width: 100%;
    height: 100%;
    border-radius: 10px;
    border: 2px solid #333;
    background: black;
  }
  .channel-list {
    flex: 1;
    background-color: #000;
    overflow-y: auto;
    padding: 10px 15px;
  }
  .channel-card {
    background-color: #2c2c2c;
    margin-bottom: 8px;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    transition: background-color 0.3s;
  }
  .channel-card:hover {
    background-color: #444;
    color: white;
  }
  .episode-name {
    flex: 1;
    text-align: right;
  }
  .episode-thumb {
    width: 100px; 
    height: 56px; 
    margin-left: 10px;
    border-radius: 6px;
    object-fit: cover;
    box-shadow: 0 4px 8px rgba(0,0,0,0.5); /* ظل للصورة المصغرة */
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="title">الرادود عباس الأعرجي</div>

  <div class="video-player">
    <iframe id="videoPlayer" src="https://www.youtube.com/embed/gxT71HOdD-s" frameborder="0" allowfullscreen></iframe>
  </div>

  <div class="channel-list" id="episodeList">
    <!-- الفيديوهات ستضاف هنا -->
  </div>

<script>
  const videoPlayer = document.getElementById('videoPlayer');
  const episodeList = document.getElementById('episodeList');

  const videosRaw = `
https://www.youtube.com/watch?v=sZigdJQurGg
https://www.youtube.com/watch?v=V5ZuMs3tVmk
https://www.youtube.com/watch?v=hinKKnK8kmc
https://www.youtube.com/watch?v=qOK7vYWkBnQ

`;

  const videos = videosRaw.trim().split('\n').map(url => {
    let id = '';
    if (url.includes('youtu.be/')) {
      id = url.split('youtu.be/')[1];
    } else if (url.includes('watch?v=')) {
      id = url.split('v=')[1];
    } else {
      id = url;
    }
    if (id.includes('?')) id = id.split('?')[0];
    if (id.includes('&')) id = id.split('&')[0];
    return id;
  });

  videos.forEach((id, index) => {
    const card = document.createElement('div');
    card.classList.add('channel-card');
    card.dataset.src = `https://www.youtube.com/embed/${id}`;

    const name = document.createElement('div');
    name.classList.add('episode-name');
    name.textContent = `الفـيديو رقـم ${index + 1}`;

    const thumb = document.createElement('img');
    thumb.src = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
    thumb.classList.add('episode-thumb');

    card.appendChild(name);
    card.appendChild(thumb);
    card.addEventListener('click', () => {
      videoPlayer.src = card.dataset.src;
    });

    episodeList.appendChild(card);
  });

  if (videos.length > 0) {
    videoPlayer.src = `https://www.youtube.com/embed/${videos[0]}`;
  }
</script>
</body>
</html>
